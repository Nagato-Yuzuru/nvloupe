name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
      - run: just fmt-check
      - run: just lint

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
      - run: just test

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    # id-token lets Codecov authenticate via OIDC instead of a stored
    # CODECOV_TOKEN secret. Tokenless; nothing to rotate.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          cache: true
      - uses: Swatinem/rust-cache@v2
      - run: just cov-lcov
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          use_oidc: true
          fail_ci_if_error: false
